name: medproect
description: "MedProect - Salomatlikni kuzatish va dori-darmonlarni nazorat qilish tizimi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.2
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.3
  image_picker: ^1.1.2
  google_mlkit_image_labeling: ^0.12.0
  shared_preferences: ^2.3.4
  intl: ^0.20.2
  uuid: ^4.5.1
  pdf: ^3.11.1
  printing: ^5.13.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/app_icon.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
